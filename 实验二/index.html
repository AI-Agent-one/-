<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>网页音乐播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
            color: #fff;
        }

        .blur-bg {
            position: fixed;
            inset: 0;
            background: url('https://picsum.photos/id/1019/1920/1080') center/cover no-repeat;
            filter: blur(30px) brightness(0.6);
            z-index: -1;
            transition: background-image 0.5s ease;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 75vh;
            gap: 100px;
            padding: 0 50px;
            flex-wrap: wrap;
        }

        .record-container {
            width: 350px;
            height: 350px;
        }

        .record {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        #albumCover {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: url('https://picsum.photos/id/1019/300/300') center/cover no-repeat;
        }

        .rotate-playing {
            animation: rotate 20s linear infinite;
            animation-play-state: running;
        }

        .rotate-paused {
            animation: rotate 20s linear infinite;
            animation-play-state: paused;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .info-container h1 {
            font-size: 4rem;
            font-weight: normal;
            margin-bottom: 10px;
        }

        .info-container p {
            font-size: 1.2rem;
            opacity: 0.7;
        }

        .control-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
        }

        .progress-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .progress {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #fff;
            transition: width 0.1s;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .left-controls, .right-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .ctrl-btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: opacity 0.2;
        }

        .ctrl-btn:hover {
            opacity: 0.8;
        }

        .play-btn {
            font-size: 2rem;
            border: 2px solid #fff;
            border-radius: 50%;
            padding: 8px 12px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #volumeSlider {
            width: 80px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            outline: none;
            -webkit-appearance: none;
        }

        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        .playlist {
            position: fixed;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100%;
            background: rgba(0,0,0,0.9);
            transition: 0.3s;
            padding: 20px;
            z-index: 10;
        }

        .playlist.active {
            right: 0;
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .playlist-header button {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .playlist-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .playlist-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .playlist-item.active {
            color: #1db954;
            font-weight: bold;
            background: rgba(255,255,255,0.1);
        }

        .speed-text {
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 8px;
        }
    </style>
</head>
<body>
    <div class="blur-bg" id="blurBg"></div>

    <div class="container">
        <div class="record-container">
            <div class="record">
                <div id="albumCover" class="rotate-paused"></div>
            </div>
        </div>

        <div class="info-container">
            <h1 id="songTitle">晴天</h1>
            <p id="songAuthor">周杰伦</p>
        </div>
    </div>

    <div class="control-bar">
        <div class="progress-bar">
            <span id="currentTime">00:00</span>
            <div class="progress" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span id="totalTime">00:00</span>
        </div>

        <div class="controls">
            <div class="left-controls">
                <button id="playModeBtn" class="ctrl-btn">🔁</button>
                <button id="prevBtn" class="ctrl-btn">⏮</button>
                <button id="playBtn" class="ctrl-btn play-btn">▶</button>
                <button id="nextBtn" class="ctrl-btn">⏭</button>
                <div class="volume-control">
                    <button id="volumeBtn" class="ctrl-btn">🔊</button>
                    <input type="range" id="volumeSlider" min="0" max="100" value="100">
                </div>
            </div>

            <div class="right-controls">
                <span id="speedText" class="speed-text">1.0X</span>
                <button id="listBtn" class="ctrl-btn">☰</button>
            </div>
        </div>
    </div>

    <div class="playlist" id="playlist">
        <div class="playlist-header">
            <h3>播放列表</h3>
            <button id="closeListBtn">×</button>
        </div>
        <div id="playlistContent"></div>
    </div>

    <audio id="audioPlayer" preload="metadata"></audio>

    <script>
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const cover = document.getElementById('albumCover');
        const progressFill = document.getElementById('progressFill');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeBtn = document.getElementById('volumeBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const listBtn = document.getElementById('listBtn');
        const playlist = document.getElementById('playlist');
        const closeListBtn = document.getElementById('closeListBtn');
        const playlistContent = document.getElementById('playlistContent');
        const songTitleEl = document.getElementById('songTitle');
        const songAuthorEl = document.getElementById('songAuthor');
        const blurBg = document.getElementById('blurBg');
        const playModeBtn = document.getElementById('playModeBtn');
        const speedText = document.getElementById('speedText');

        const songs = [
            { 
                name: "勇气", 
                author: "梁静茹", 
                src: "M5000019cLLA3rRmj2.mp3", 
                img: "image2.png"
            },
            {
              name: "七里香",
              author: "周杰伦",
              src: "M500004Z8Ihr0JIu5s.mp3",
              img: "image.png"
            },
            {
                name: "我们的明天",
                author: "鹿晗",
                src: "92424028.mp3",
                img: "image3.png"
            }
        ];

        let currentIndex = 0;
        let playMode = 0;
        let lastVolume = 1;

        audio.addEventListener('loadedmetadata', () => {
            if (!isNaN(audio.duration)) {
                totalTimeEl.textContent = formatTime(audio.duration);
            }
        });

        function initPlaylist() {
            playlistContent.innerHTML = '';
            songs.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = 'playlist-item';
                if (index === currentIndex) item.classList.add('active');
                item.textContent = `${song.name} - ${song.author}`;
                item.onclick = () => {
                    loadSong(index);
                    safePlay();
                    updatePlaylistStyle();
                };
                playlistContent.appendChild(item);
            });
        }

        function updatePlaylistStyle() {
            document.querySelectorAll('.playlist-item').forEach((item, i) => {
                item.classList.toggle('active', i === currentIndex);
            });
        }

        // ========== 修复点：切歌前先暂停 ==========
        function loadSong(index) {
            audio.pause(); // 先停止当前歌曲
            currentIndex = index;
            const song = songs[index];
            audio.src = song.src;
            songTitleEl.textContent = song.name;
            songAuthorEl.textContent = song.author;
            blurBg.style.backgroundImage = `url('${song.img}')`;
            cover.style.backgroundImage = `url('${song.img}')`;
            progressFill.style.width = '0%';
            updatePlaylistStyle();
        }

        function safePlay() {
            audio.play().then(() => {
                playBtn.textContent = "❚❚";
                cover.className = 'rotate-playing';
            }).catch(e => {
                playBtn.textContent = "▶";
                cover.className = 'rotate-paused';
            });
        }

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                safePlay();
            } else {
                audio.pause();
                playBtn.textContent = "▶";
                cover.className = 'rotate-paused';
            }
        });

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percent + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            if (audio.duration) audio.currentTime = pos * audio.duration;
        });

        volumeSlider.addEventListener('input', () => {
            audio.volume = volumeSlider.value / 100;
            volumeBtn.textContent = audio.volume === 0 ? '🔇' : '🔊';
            lastVolume = audio.volume;
        });

        volumeBtn.addEventListener('click', () => {
            if (audio.volume > 0) {
                lastVolume = audio.volume;
                audio.volume = 0;
                volumeSlider.value = 0;
                volumeBtn.textContent = '🔇';
            } else {
                audio.volume = lastVolume || 1;
                volumeSlider.value = audio.volume * 100;
                volumeBtn.textContent = '🔊';
            }
        });

        // ========== 修复上一曲、下一曲 ==========
        prevBtn.addEventListener('click', () => {
            currentIndex = playMode === 2
                ? Math.floor(Math.random() * songs.length)
                : (currentIndex - 1 + songs.length) % songs.length;
            loadSong(currentIndex);
            safePlay();
        });

        nextBtn.addEventListener('click', () => {
            currentIndex = playMode === 2
                ? Math.floor(Math.random() * songs.length)
                : (currentIndex + 1) % songs.length;
            loadSong(currentIndex);
            safePlay();
        });

        playModeBtn.addEventListener('click', () => {
            playMode = (playMode + 1) % 3;
            playModeBtn.textContent = [ '🔁', '🔂', '🔀' ][playMode];
        });

        audio.addEventListener('ended', () => {
            if (playMode === 1) {
                audio.currentTime = 0;
                safePlay();
            } else {
                nextBtn.click();
            }
        });

        speedText.addEventListener('click', () => {
            const speeds = [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0];
            let i = speeds.indexOf(audio.playbackRate);
            audio.playbackRate = speeds[(i + 1) % speeds.length];
            speedText.textContent = audio.playbackRate + 'X';
        });

        listBtn.addEventListener('click', () => playlist.classList.add('active'));
        closeListBtn.addEventListener('click', () => playlist.classList.remove('active'));

        function formatTime(s) {
            const m = String(Math.floor(s / 60)).padStart(2, '0');
            const sec = String(Math.floor(s % 60)).padStart(2, '0');
            return `${m}:${sec}`;
        }

        window.addEventListener('DOMContentLoaded', () => {
            initPlaylist();
            loadSong(0);
            audio.volume = 1;
        });
    </script>
</body>
</html>
